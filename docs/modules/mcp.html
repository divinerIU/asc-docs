# 服务与集成

## 什么是 MCP

MCP 就是 ASC 的**万能插头**。

你的电脑有 USB 接口——任何支持 USB 的设备都能插上即用：U 盘、鼠标、键盘、打印机。你不需要为每个设备安装不同的接口。

MCP 也是一样——任何支持 MCP 协议的工具服务器都能接入 ASC：MATLAB、Simulink、自定义分析服务、数据库查询工具。你不需要为每个工具写专门的集成代码。

**为什么需要 MCP？**

因为 Simulink 工程师的工具链很长——MATLAB、Simulink、Stateflow、测试框架、CI/CD 系统、代码审查工具……ASC 内置的工具只能覆盖基本操作，但通过 MCP，ASC 可以调用你工具链里的任何工具。

## 它能帮你做什么

**调用 MATLAB**：ASC 可以通过 MCP 直接执行 MATLAB 代码、操作 Simulink 模型。你不需要切换窗口——在 ASC 里说"帮我跑一下这个仿真"，它直接调用 MATLAB 完成。

**连接自定义工具**：你们团队有自己的分析工具？只要它支持 MCP 协议，ASC 就能调用。不需要改 ASC 的代码，只需要配置一下。

**即插即用**：配置好 MCP 服务器后，ASC 会自动发现它提供的所有工具。你不需要手动注册——插上就能用。

## 工具命名：清晰的来源标识

MCP 工具的命名格式是 `mcp__服务器名__工具名`。比如 MATLAB 服务器的 `run_code` 工具，ASC 里叫 `mcp__matlab__run_code`。

这就像 USB 设备的名称——你能清楚地知道这个工具来自哪个服务器。

## 连接管理：自动重连

MCP 连接有完整的生命周期管理：

```mermaid
stateDiagram-v2
    [*] --> 发现配置: 找到服务器配置
    发现配置 --> 启动服务器: 启动进程
    启动服务器 --> 握手: 连接成功
    握手 --> 就绪: 协议确认
    就绪 --> 执行中: 调用工具
    执行中 --> 就绪: 调用完成
    就绪 --> 重连中: 连接断开
    重连中 --> 启动服务器: 自动重连
    就绪 --> 关闭: 会话结束
```

**自动重连**：如果 MCP 服务器的连接断了，ASC 会自动尝试重新连接。你不需要手动重启——它会自己恢复。

**延迟加载**：ASC 不会在启动时就连接所有 MCP 服务器——而是在第一次调用时才连接。这避免了启动时的不必要开销。

## 配置方式

MCP 服务器的配置可以放在三个地方：

| 位置 | 用途 | 优先级 |
|------|------|--------|
| 用户目录 | 你个人常用的服务器 | 最低 |
| 项目目录 | 项目特定的服务器 | 中 |
| 本地覆盖 | 不提交 Git 的临时配置 | 最高 |

这就像你的开发环境配置——有全局的、有项目级的、有本地临时的。

## 资源与提示词：不只是工具

MCP 协议不仅能提供工具，还能提供两种额外能力：

**资源**：MCP 服务器可以暴露可读的数据源。比如 MATLAB 服务器可以提供"当前工作区变量列表"作为资源。

**提示词**：MCP 服务器可以提供推理策略。这些策略会自动注册为 ASC 的技能——你不需要手动定义，插上 MCP 服务器就有了。

## 设计哲学

### 开放扩展，而不是封闭集成

ASC 的内置工具是有限的，但通过 MCP，它的能力是无限的。这就像手机的 App Store——手机本身功能有限，但通过安装 App，它能做任何事情。

### 标准协议，而不是定制集成

MCP 是一个标准协议，不是 ASC 专门为某个工具设计的集成方案。任何支持 MCP 的工具都能接入——无论是 MATLAB、Simulink 还是你自己写的工具。

### 即插即用，不需要改代码

接入一个新的 MCP 服务器不需要修改 ASC 的代码——只需要配置一下。这对工程团队来说意味着：任何人都能扩展 ASC 的能力，不需要开发者介入。
