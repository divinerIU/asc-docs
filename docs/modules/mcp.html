# 服务与集成（MCP）

## MCP 解决什么问题？

ASC 内置了 18 个工具，覆盖文件操作、搜索、记忆管理等基础能力。但汽车嵌入式建模需要的远不止这些——你需要调用 MATLAB 引擎、操作 Simulink 模型、运行 MIL 仿真、调用 AUTOSAR 工具链。这些能力不可能全部内置。

MCP（Model Context Protocol）是解决这个问题的标准协议。它定义了 LLM Agent 和外部工具服务器之间的通信方式——就像 USB 定义了计算机和外设之间的通信方式。

通过 MCP，ASC 可以连接任何实现了 MCP 协议的服务器，把服务器提供的工具当作内置工具使用。用户不需要修改 ASC 的代码，只需要配置一个 MCP 服务器地址。

## 设计哲学：协议即接口

MCP 集成的设计哲学是**协议即接口**。ASC 不关心 MCP 服务器内部怎么实现——它只关心服务器是否遵循 MCP 协议。这带来了几个关键好处：

- **解耦**：ASC 和 MCP 服务器可以独立开发、独立升级
- **可替换**：同一个功能可以有多个 MCP 服务器实现，用户可以自由选择
- **可组合**：多个 MCP 服务器可以同时连接，它们的工具在同一个命名空间中共存

## 懒加载：不调用不连接

MCP 服务器在 ASC 启动时**不连接**。只有当 LLM 第一次请求调用某个 MCP 工具时，ASC 才启动对应的服务器进程、建立连接、发现工具。

这个设计的动机是：
- MCP 服务器可能需要几秒到几十秒的启动时间（特别是 MATLAB 引擎）
- 不是每次会话都会用到所有 MCP 服务器
- 懒加载避免了启动时的"冷启动惩罚"

## 命名空间：避免冲突

当多个 MCP 服务器同时连接时，它们的工具可能同名。ASC 用命名前缀解决这个问题：每个 MCP 工具的名称格式为 `mcp__<服务器名>__<工具名>`。

例如，一个名为 `matlab-mcp-core` 的服务器提供的 `evaluate_code` 工具，在 ASC 中的名称是 `mcp__matlab_mcp_core__evaluate_code`。

这个命名规则是扁平的、确定性的——不需要注册中心来管理名称分配。

## 连接生命周期

MCP 连接有明确的状态机：

```mermaid
stateDiagram-v2
    [*] --> Discovered: 配置文件被发现
    Discovered --> Starting: 首次工具调用
    Starting --> Handshaking: 进程启动成功
    Handshaking --> Ready: 协议版本协商完成
    Ready --> Executing: 工具调用请求
    Executing --> Ready: 调用完成
    Executing --> Reconnecting: 连接断开
    Reconnecting --> Starting: 自动重连
    Ready --> Shutdown: ASC 退出
```

**协议版本协商**：ASC 支持多个 MCP 协议版本（2025-03-26、2024-11-05、2024-10-07），在握手阶段按优先级尝试。这确保 ASC 能同时连接新旧版本的 MCP 服务器。

**自动重连**：如果工具调用失败且原因是连接断开，ASC 会自动关闭旧连接、启动新进程、重新握手、重试调用。用户感知到的是一次短暂的延迟，而不是一个失败的工具调用。

## 三种配置来源

MCP 服务器的配置从三个位置发现，按优先级从低到高：

1. **用户级**：`~/.asc/settings.json` 中的 `mcpServers` 字段
2. **项目级**：项目根目录到当前目录沿途的 `.mcp.json` 文件
3. **本地覆盖**：当前目录的 `.asc/settings.json`

项目级配置允许多个项目使用不同的 MCP 服务器集合。本地覆盖允许开发者在不影响团队的情况下临时调整配置。

配置变更检测基于签名比较——只有配置内容实际变化时才会重启 MCP 服务器。

## MCP 的三种能力

MCP 协议不仅提供工具。它还提供两种额外的能力：

### 资源（Resources）

资源是 MCP 服务器暴露的只读数据。比如一个 MATLAB MCP 服务器可以暴露"当前工作区变量列表"作为资源。ASC 可以读取这些资源，把内容注入到 LLM 的上下文中。

资源和工具的区别是：工具执行操作（有副作用），资源提供数据（只读）。

### 提示（Prompts）

提示是 MCP 服务器提供的操作指导。ASC 自动把 MCP 提示转换为运行时技能（命名为 `mcp:<服务器名>:<提示名>`）。这意味着 MCP 服务器不仅能提供"手"（工具），还能提供"脑"（操作指导）。

## Simulink 事务保护

对于涉及 Simulink 模型修改的 MCP 工具调用，ASC 实施事务保护：

- **调用前**：快照模型状态
- **调用中**：执行工具操作
- **调用后**：验证模型状态是否符合预期

如果验证失败，系统可以回滚到快照状态。这防止了一个失败的 MCP 调用导致模型处于不一致状态。

## 设计权衡

### 为什么用 stdio 而非 HTTP？

MCP 的标准传输方式是 stdio（标准输入/输出），即 ASC 启动 MCP 服务器的进程，通过 stdin/stdout 通信。这比 HTTP 更简单（不需要端口管理、不需要网络配置）、更安全（进程间通信，不暴露网络端口）、更适合本地工具。

### 为什么懒加载而非预连接？

MATLAB 引擎的启动可能需要 30 秒以上。如果预连接，每次启动 ASC 都要等。如果用户这次会话不用 MATLAB，这个等待就是浪费的。懒加载确保只在需要时才付出启动成本。

### 为什么自动重连而非报错？

MCP 服务器可能因为各种原因崩溃（内存不足、MATLAB 引擎超时）。在长时间会话中，偶尔的服务器崩溃是正常的。自动重连让用户不需要手动干预，保持工作流的连续性。
