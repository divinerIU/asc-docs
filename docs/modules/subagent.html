# 多智能体系统

## 为什么需要子代理？

一个 LLM Agent 能做很多事情，但有些任务更适合在**隔离环境**中执行。原因有三：

**上下文保护**：主对话的上下文窗口是宝贵的。如果主 Agent 花 50 轮对话去做一个子任务（比如搜索所有 `.slx` 文件并分析依赖关系），这 50 轮的工具调用结果会挤占上下文空间，影响后续对话质量。子代理有自己的上下文，不会污染主对话。

**并行执行**：有些任务可以同时进行——比如同时分析三个不同的子系统。主 Agent 是单线程的（同一时间只处理一个推理循环），但可以同时启动多个子代理。

**能力限制**：某些操作应该在受限环境中执行。比如"记忆蒸馏"技能只需要读取会话和写入记忆文件，不应该有能力执行 shell 命令或修改模型。子代理可以通过工具过滤实现这种能力限制。

## 设计哲学：空白运行时 + 能力注入

ASC 的子代理系统采用**空白运行时 + 技能注入**的设计。这意味着：

- 子代理本身没有任何内置能力——它是一个"空白"的 Agent
- 能力在创建时通过技能注入——主 Agent 授予子代理哪些技能，子代理就有哪些能力
- 工具不是子代理固有的——工具来自被授予的技能

这种设计的核心优势是**能力组合**。不需要定义"研究型子代理"、"编码型子代理"等类型。一个空白 Worker 被授予"搜索"技能就成了研究员；被授予"Simulink 编辑"技能就成了建模工程师。

## 唯一的内置类型：Worker

ASC 只定义了一种子代理类型：**Worker**。Worker 的系统提示非常简洁，核心指令包括：

- 你是被主 Agent 委派来执行特定任务的
- 专注于分配给你的任务，不要做多余的事
- 不要创建不必要的文件
- 不要过度工程化

这些指令是**反幻觉指令**——针对工程任务中子代理容易出现的问题（过度生成代码、创建不必要的文件、偏离任务目标）。

## 安全约束：不可递归

子代理不能创建子代理。`_sanitize_granted_tools` 函数在构建子代理工具集时会移除 `agent` 和 `sub-agent` 工具。这防止了：

- 无限递归（子代理创建子代理创建子代理……）
- 资源爆炸（每个子代理消耗 LLM API 调用）
- 控制流失控（无法追踪多层嵌套的代理）

这是一个硬性约束——不是通过提示指令（LLM 可能不遵守），而是通过代码强制执行（从工具集中物理移除）。

## 权限继承

子代理继承主 Agent 的权限设置：

- **权限模式**：主 Agent 的 `permission_mode` 传递给子代理
- **确认缓存**：主 Agent 已经确认过的操作，子代理不需要再次确认
- **工作区边界**：子代理和主 Agent 共享同一个工作区

这种继承是通过引用共享实现的——子代理和主 Agent 指向同一个 `_confirmed_permissions` 集合。用户在主 Agent 中确认了对 `foo.py` 的写入，子代理也可以直接写入 `foo.py`。

## 可见性控制

子代理有三种可见性级别：

| 级别 | 含义 | 使用场景 |
|------|------|---------|
| public | 主 Agent 可以直接调用 | 通用任务委派 |
| model | LLM 可以看到描述但需要通过特定路径调用 | 专业工具 |
| internal | 只有系统内部使用，LLM 不可见 | 后台任务（标题生成、记忆蒸馏）|

internal 级别的子代理对 LLM 不可见——它们由系统自动启动，不占用 LLM 的注意力。

## 结果模式

子代理支持两种结果返回模式：

**文本模式**：子代理的最终回复作为纯文本返回给主 Agent。适用于开放式任务（搜索、分析）。

**JSON 模式**：子代理的回复必须是符合特定 schema 的 JSON。适用于结构化任务（标题生成需要返回 `{title: string}`）。如果回复不符合 schema，系统会重试。

JSON 模式使得子代理可以作为**可组合的构建块**——一个子代理输出的 JSON 可以作为另一个子代理的输入。

## 设计权衡

### 为什么只有一种 Worker 类型？

如果定义多种子代理类型（研究员、编码员、审查员），就需要维护多套系统提示、多套工具配置、多套安全约束。当需要新的角色组合时，又要新增类型。

Worker + 技能注入的模式更加灵活：任何角色都可以通过组合不同的技能来实现。新增一个"架构审查"子代理不需要改代码——只需要定义一个"架构审查"技能，然后授予 Worker。

### 为什么禁止递归？

递归子代理是很多多 Agent 系统的特性（Agent 可以创建 Agent），但在工程场景下风险太大：

- **资源不可控**：每个子代理消耗 LLM API 调用，递归创建可能导致指数级成本
- **调试困难**：多层嵌套的代理对话难以追踪和复现
- **安全边界模糊**：权限继承在递归场景下变得复杂

ASC 选择简单性：主 Agent 可以创建子代理，子代理不能再创建。这覆盖了 99% 的实际需求。

### 为什么权限通过引用共享而非复制？

如果子代理获得权限的副本，用户在主 Agent 中确认的操作在子代理中不会被识别为已确认——用户会被重复弹出确认对话框。引用共享确保确认只发生一次。
