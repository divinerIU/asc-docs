# 会话管理

## 会话的工程意义

一次 ASC 会话不仅仅是"和 AI 聊天"。它是一段完整的工程工作记录——包含了所有的对话、工具调用、文件修改、决策过程。这个记录需要持久化，原因有三：

- **可恢复**：进程崩溃、电脑重启、误关终端——用户需要能从断点继续
- **可审计**：工程决策需要追溯——"为什么当初这样改的？"
- **可并行**：不同的任务可能需要不同的会话——建模和调试可以同时进行

## 追加写入：为什么不用覆盖？

ASC 的会话存储使用 **JSONL（JSON Lines）格式**——每条记录是一行独立的 JSON。每次保存会话时，系统追加一行新记录，而不是覆盖整个文件。

这个设计的核心动机是**崩溃安全**。

如果使用覆盖模式（读取 → 修改 → 写入整个文件），在"写入"过程中进程被杀死，文件会处于不完整的状态——既不是旧版本也不是新版本，数据丢失。

JSONL 的追加模式完全不同：每次写入是一行完整的 JSON。即使进程在写入过程中被杀死，已写入的行是完整的，最后可能多一行不完整的数据（可以检测并丢弃）。之前的数据全部安全。

每次写入后，ASC 还会调用 `fsync` 确保数据从操作系统缓冲区写入磁盘。这比普通写入慢一些，但保证了极端情况下的数据安全。

## 两种记录类型

JSONL 日志中的记录分两种类型：

**重置记录（reset）**：包含完整的会话状态——所有消息、元数据、时间戳。在以下情况写入：
- 会话首次创建
- 上下文压缩导致消息历史被修改
- 消息修复（补全中断的工具调用序列）

**追加记录（append）**：只包含新增的消息。当会话状态是前一次状态的严格超集时使用。这是最常见的情况——每次 LLM 回复和工具调用后，只追加新消息。

系统在写入前会检查一个不变量：当前消息历史是否是上一次保存的历史的严格超集？如果不是（比如上下文压缩删除了早期消息），就退回到重置记录。这防止了压缩操作导致的数据丢失。

## 消息修复：处理中断的对话

LLM 对话经常在不正常的状态下中断——进程被杀死、网络断开、用户按了两次 Ctrl+C。这会导致消息序列出现"断裂"：

- LLM 发出了工具调用请求，但工具结果还没有返回
- 工具结果返回了，但 LLM 还没有看到
- 连续两条同一角色的消息（正常情况下应该是交替的）

ASC 在加载会话时会自动修复这些问题：

- **孤立的工具调用**：有调用请求但没有结果 → 添加一个"中断"状态的结果
- **孤立的工具结果**：有结果但没有对应的调用请求 → 删除结果
- **系统消息**：OpenAI 格式中的 system 消息在恢复时被剥离（系统提示由 prompt 模块重新生成）

修复后的消息序列对 LLM 来说是完全有效的——它不知道对话曾经中断过。

## 双格式支持

ASC 同时支持 Anthropic 和 OpenAI 两种消息格式的会话。这意味着：

- 用 Anthropic 后端创建的会话可以用 OpenAI 后端恢复（反之亦然）
- 会话格式的选择由创建时使用的后端决定
- 恢复时，系统会自动检测格式并使用对应的修复逻辑

这种双格式支持不是通过统一中间层实现的——ASC 维护两套独立的消息历史。会话文件中只存储其中一套（创建时使用的那套），恢复时根据格式类型使用对应的解析和修复逻辑。

## 会话标题：自动生成与手动设置

每个会话有一个标题，用于在 `/sessions` 列表中导航。标题的来源有三种：

1. **自动生成**：后台子代理分析会话内容，生成简短标题
2. **用户手动设置**：通过 `/metadata` 命令
3. **默认值**：使用时间戳

**粘性标题**机制：一旦标题被用户手动设置或由 `session-title` 技能生成，它就不会被自动标题覆盖。这防止了用户精心设置的标题被意外替换。

## 活跃会话标记

`.asc/sessions/.active_session` 文件记录当前活跃的会话 ID。这使得：

- 重启 ASC 后可以自动恢复上次的会话
- `/resume` 命令知道恢复哪个会话
- 多个 ASC 进程可以检测会话冲突

活跃会话标记在会话创建时写入，在显式结束（`/new`、`/exit`）时清除。如果进程异常退出，标记可能残留——ASC 会通过空闲超时（默认 3600 秒）判断残留会话是否应该被视为已结束。

## 记忆与会话的关系

会话和记忆是两个独立但协同的系统：

| 维度 | 会话 | 记忆 |
|------|------|------|
| 生命周期 | 一次对话 | 跨对话持久 |
| 内容 | 完整对话历史 | 提炼后的知识 |
| 大小 | 可能很大（几 MB） | 很小（几 KB）|
| 用途 | 恢复上下文、审计 | 注入领域知识 |
| 存储格式 | JSONL 追加日志 | JSON 文件 |

会话结束时，系统从会话记录中提取关键信息更新记忆。下次会话开始时，记忆被注入系统提示。这形成了一个知识循环：会话 → 记忆 → 新会话。

## 设计权衡

### 为什么用 JSONL 而非 SQLite？

JSONL 是纯文本，可以直接用文本编辑器查看，可以用 `grep` 搜索，可以用 Git 跟踪。SQLite 是二进制格式，需要专门的工具才能查看和查询。

对 ASC 来说，透明性和可调试性比查询性能更重要——用户和开发者需要能直接看到会话文件里有什么。

### 为什么子代理不写会话？

子代理（如标题生成、记忆蒸馏）不向会话存储写入数据。原因是子代理的对话通常很短、目的单一、不包含用户交互。把它们写入会话日志会增加文件大小但不增加审计价值。子代理的结果（标题、记忆更新）通过其他路径持久化。

### 为什么有空闲超时？

如果没有空闲超时，异常退出的会话永远标记为"活跃"，后续的 `asc setup` 会尝试恢复一个可能已经过时的会话。3600 秒的超时确保残留标记在合理时间内被清理。
