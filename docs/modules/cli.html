# 命令行与斜杠命令

## 两种交互方式

ASC 有两种和你交流的方式：

**启动命令**：在终端里输入 `asc setup`，启动 ASC 的对话界面。这是你和 ASC 的"入口"。

**斜杠命令**：在对话过程中，输入 `/` 开头的命令，执行快捷操作。这就像在聊天软件里输入 `/` 看表情包一样——快速触发特定功能。

## 启动命令

只有一个启动命令：`asc setup`

输入这个命令，ASC 就会启动，你进入对话界面。就这么简单。

## 斜杠命令：对话中的快捷操作

在对话过程中，你可以用 `/` 前缀执行各种快捷操作：

| 命令 | 作用 | 使用场景 |
|------|------|---------|
| `/context` | 查看上下文状态 | 看看对话还剩多少"空间" |
| `/compact` | 手动整理对话 | 对话太长了，让它整理一下 |
| `/clear` | 清空对话 | 重新开始 |
| `/skills` | 查看可用技能 | 看看 ASC 会什么 |
| `/mcp` | 查看 MCP 连接状态 | 看看外部工具是否连通 |
| `/sessions` | 查看所有对话 | 看看之前的对话列表 |
| `/resume` | 恢复之前的对话 | 继续上次没做完的事情 |
| `/new` | 开始新对话 | 重新开始 |
| `/summary` | 生成对话总结 | 让 AI 写一份会议纪要 |
| `/todo` | 查看待办事项 | 看看还有什么没做 |
| `/help` | 查看帮助 | 不知道用什么命令时 |
| `/exit` | 退出 | 结束对话 |
| `/plugins` | 管理插件 | 安装或查看插件 |

## 打错了也不会报错

如果你输入了一个不存在的命令，ASC 不会报错——它会尝试把它当作技能名来执行。比如你输入 `/check-model`，ASC 会去找一个叫 `check-model` 的技能。如果找不到，它会显示帮助信息。

这就像在聊天软件里输入一个不存在的表情——它不会崩溃，只是显示"没有这个表情"。

## 文件引用：快速分享文件内容

在对话中，你可以用 `#文件路径` 把文件内容直接加入对话。比如：

```
帮我看看这个模型的配置 #./config/model_params.json
```

ASC 会自动读取文件内容，加入到对话上下文中。这比手动打开文件、复制、粘贴要方便得多。

## 设计哲学

### 简单入口，丰富内部

启动命令只有一个：`asc setup`。不需要记复杂的命令行参数。所有丰富的功能都在对话界面里通过斜杠命令实现。

### 技能就是命令

你定义的技能会自动成为可用的斜杠命令。这意味着你可以通过写技能文件来"扩展" ASC 的命令——不需要改代码，不需要编译。

### 容错设计

输入错误不会导致系统崩溃。ASC 会尽量理解你的意图，给出友好的提示。
