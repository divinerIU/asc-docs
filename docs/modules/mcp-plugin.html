# MCP 客户端实现

本页面介绍 MCP 连接的内部工作原理。关于 MCP 的概念和使用方式，请参阅 [服务与集成](mcp.html)。

## 连接是怎么建立的

当你第一次调用 MCP 工具时，ASC 会自动完成以下步骤：

1. **读取配置**：从配置文件里找到 MCP 服务器的启动命令
2. **启动服务器**：把 MCP 服务器作为子进程启动
3. **握手**：和服务器确认协议版本（就像两个人确认"我们说同一种语言"）
4. **发现能力**：问服务器"你会做什么工具？"，获取工具列表

之后每次调用工具，ASC 直接把请求发给已经连接好的服务器。

## 自动重连：连接断了也不怕

MCP 服务器的连接可能会断——比如服务器进程崩溃了、网络出了问题。ASC 会自动检测并重连：

1. 发现连接断了
2. 清理旧连接
3. 重新启动服务器
4. 重新握手
5. 恢复工具调用

整个过程自动完成，你不需要手动干预。就像手机自动重连 WiFi——断了就重连，你甚至不会注意到。

## 延迟加载：不用的不启动

ASC 不会在启动时就连接所有 MCP 服务器——而是在第一次调用时才连接。这避免了启动时的不必要开销。

就像你不会在开机时就打开所有 App——需要哪个开哪个。

## 配置变更自动检测

如果你修改了 MCP 服务器的配置（比如换了启动命令），ASC 会自动检测到变化，重建连接。不需要重启 ASC。

## 健康监控：随时查看连接状态

用 `/mcp` 命令可以查看所有 MCP 服务器的状态：
- 哪些服务器是连通的
- 每个服务器提供哪些工具
- 有没有连接错误
- 配置来自哪个文件

这就像查看网络连接状态——一眼就能看出哪个通、哪个断。

## 设计哲学

### 自动化一切可以自动化的

连接、重连、加载、检测——所有这些都不需要你手动操作。ASC 把复杂性藏在内部，你只需要关心"用什么工具"，不需要关心"怎么连接"。

### 透明的状态

虽然连接管理是自动的，但状态是透明的。你随时可以用 `/mcp` 查看所有连接的状态。没有黑箱。
