# 上下文管理

## 为什么需要上下文管理？

LLM 的上下文窗口是固定大小的——不管对话进行多久，每次推理只能看到窗口内的内容。这就像一个工作台：面积有限，东西放多了就要清理。

但 LLM 对话不同于普通聊天。一次复杂的建模任务可能涉及几十次文件读写、模型查询、代码生成。每次工具调用的结果都会占用上下文空间。不加管理的话，20 轮对话后上下文就满了，LLM 看不到系统提示和早期对话，行为会退化。

上下文管理的设计目标是：**在有限窗口内保持最大的有效信息密度**。

## 五级压缩策略

ASC 的上下文管理采用五级渐进式压缩。每一级的压缩力度递增，信息损失也递增。系统总是先尝试代价最低的策略，不够再升级。

### L1：裁剪过期工具结果

**触发条件**：上下文使用率超过 50%

**策略**：把较早的工具调用结果替换为 `[Content snipped - re-read if needed]`。保留最近 3 次工具调用的完整结果。

**设计意图**：工具结果通常是上下文中最大的内容块（一次 `read_file` 可能返回几千行代码）。但 LLM 通常只需要最近的几次结果来做决策。过期的结果可以安全裁剪——如果 LLM 需要，它可以重新读取文件。

**特殊处理**：如果同一个文件被读取了多次（在不同时间点），只保留最近一次的结果。这是因为旧版本的文件内容对 LLM 没有价值。

### L2：微压缩

**触发条件**：L1 不够，且上下文使用率仍然偏高

**策略**：把更早的工具结果替换为 `[Old result cleared]`。比 L1 更激进——L1 保留结构（工具名、参数），L2 连结构都清理。

**双模式设计**：

- **热模式**（上次 API 调用在 1 小时内）：只修改发送给 API 的请求内容，不动本地历史。这保护了 Anthropic 的 prompt cache 前缀——如果本地历史被修改，cache 前缀就会失效，下次调用的成本会增加。
- **冷模式**（空闲超过 1 小时）：直接修改本地历史。反正 cache 已经过期了，不需要保护。

这个冷热分离设计是上下文管理中最精巧的权衡之一——它在信息保留、缓存效率和内存使用之间找到了平衡点。

### L3：上下文折叠

**触发条件**：上下文使用率超过 81%

**策略**：把较老的消息替换为一份结构化摘要，包含：
- 被省略的工具调用统计（读了几个文件、执行了几次命令）
- 被触及的文件列表
- 最近的用户意图

**熔断机制**：如果折叠后使用率仍然超标，系统会计数。连续 3 次折叠无效后，停止尝试，直接升级到 L5。这防止了"折叠 → 还是超 → 再折叠 → 还是超"的死循环。

**非破坏性设计**：对 Anthropic 后端，折叠只影响发送给 API 的请求视图，本地历史保持完整。这确保会话保存时不会丢失信息。OpenAI 后端由于 API 限制，只能直接修改历史。

### L4/L5：AI 摘要压缩

**触发条件**：上下文使用率超过 93%（L5），或 L3 折叠后仍然紧张（L4）

**策略**：调用 LLM 自身生成一份结构化摘要，替代所有旧消息。摘要包含 9 个固定章节：

| 章节 | 内容 | 为什么必须保留 |
|------|------|--------------|
| 意图 | 用户的核心需求 | 没有意图，LLM 不知道在做什么 |
| 概念 | 涉及的关键概念和技术术语 | 防止 LLM 遗忘领域上下文 |
| 文件 | 被操作过的文件路径 | 快速定位工作范围 |
| 错误 | 遇到的错误和解决方案 | 防止重复犯错 |
| 原话 | 用户的原话摘要 | 保留用户的精确表达，防止 LLM 曲解 |
| 任务 | Todo 列表状态 | 任务连续性 |
| 当前工作 | 正在进行的工作 | 上下文衔接 |
| 环境 | 运行环境信息 | 环境相关的决策 |
| 推理结论 | LLM 之前的推理结论 | 防止重复推理 |

**为什么用 9 个固定章节？** 因为如果让 LLM 自由决定摘要内容，它会倾向于保留它"认为重要"的信息，但 LLM 的判断不一定和用户的需求一致。固定章节确保每类信息都有位置，LLM 不能跳过。

**抑制逻辑**：L3 成功折叠后，系统设置 `_suppress_next_autocompact = True`，给一次观察机会。这防止"L3 折叠 → 还是超 → 立刻 L5 摘要"的过度压缩。

```mermaid
graph LR
    Start["上下文增长"] --> L1{"使用率 > 50%?"}
    L1 -->|否| OK["正常运行"]
    L1 -->|是| L1Do["L1: 裁剪旧结果"]
    L1Do --> L2{"仍然紧张?"}
    L2 -->|否| OK
    L2 -->|是| L2Do["L2: 微压缩"]
    L2Do --> L3{"使用率 > 81%?"}
    L3 -->|否| OK
    L3 -->|是| L3Do["L3: 上下文折叠"]
    L3Do --> L3Check{"折叠有效?"}
    L3Check -->|是| Suppress["抑制一轮"]
    Suppress --> OK
    L3Check -->|否| L3Count{"连续3次无效?"}
    L3Count -->|否| L3Do
    L3Count -->|是| L5Do["L5: AI摘要压缩"]
    L5Do --> OK
```

## Token 估算：如何预知上下文大小？

上下文管理的前提是知道当前上下文有多大。但 LLM API 在发送请求之前不告诉你精确的 token 数。ASC 使用一套自校准的估算算法。

### 基础估算

对每个字符串，按以下规则估算 token 数：
- CJK 字符：每个字符 1 token（中文、日文、韩文字符在 token 化时通常一个字符就是一个 token）
- ASCII 字母数字：每 4 个字符 1 token
- 其他符号：每 2 个字符 1 token

这是一个**保守估算**——故意偏高，宁可早压缩也不要溢出。

### 自校准

每次 API 调用返回后，系统会拿到精确的 token 使用量。系统用指数平滑公式更新校准因子：

```
新校准 = 0.7 × 旧校准 + 0.3 × (实际值 / 估算值)
```

这意味着前几次估算可能偏差较大，但随着对话进行，估算会越来越准。系统取 `max(原始估算, 校准后估算)`——永远选择更保守的那个。

### CJK 特殊处理

中文文本的 token 密度远高于英文。一句 10 个汉字的中文可能只占 10 个 token，而表达同样意思的英文可能占 20-30 个 token。ASC 的估算算法对 CJK 字符使用 1:1 的映射，这比通用的 4:1 规则更准确。

这种准确性的代价是算法更复杂（需要 Unicode 范围检测），但对一个主要服务中文用户的工具来说，这个代价是值得的。

## 缓存协同

上下文管理和 Prompt Caching 是协同工作的。Anthropic 的 prompt caching 机制允许缓存系统提示和历史消息的前缀部分，后续请求如果前缀相同就不用重新计算。

ASC 的上下文管理策略**优先保护缓存前缀**：
- L1/L2 裁剪从消息末尾开始，不触碰前面的内容
- L2 的热模式只修改请求视图，不动本地历史
- L3 的折叠针对中间消息，尽量保留首尾

这种设计确保压缩操作不会意外破坏缓存前缀，从而在控制上下文大小的同时最小化 API 成本。

## 设计权衡

### 为什么阈值是 50%/81%/93%？

这些阈值经过实测调优。50% 是 L1 的触发点——太早会不必要地裁剪有用信息，太晚会来不及在溢出前完成裁剪。81% 是 L3 的触发点——给折叠操作留出足够的"缓冲区"。93% 是 L5 的触发点——这是最后防线，再不压缩就要溢出了。

### 为什么 L3 有熔断机制？

上下文折叠是有代价的——每次折叠都会丢失一些信息。如果折叠后仍然超标（说明对话本身的信息量就超过了窗口），反复折叠只会不断丢失信息而不解决问题。熔断机制在 3 次无效尝试后直接升级到 L5（AI 摘要），用更智能的方式解决。

### 为什么 Anthropic 和 OpenAI 的处理方式不同？

Anthropic 的 API 支持"请求视图"的概念——可以发送一份和本地历史不同的消息列表，而不影响本地状态。OpenAI 的 API 没有这个能力，只能直接修改本地历史。这不是设计偏好，是 API 能力的差异。ASC 在 Anthropic 后端上能做得更好，因为它有更好的工具。
