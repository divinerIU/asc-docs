# 提示工程

## 系统提示的本质

系统提示是 LLM 的"岗位说明书"。它定义了 LLM 是谁、该做什么、不该做什么、怎么做。对 ASC 来说，系统提示的质量直接决定了 Agent 的工程判断力——同样的 LLM，配上不同的系统提示，表现可以天差地 ASC 的系统提示不是一段话，而是一份**14 章节的结构化文档**。这种设计不是为了好看，而是为了解决三个工程问题。

## 14 章节的设计逻辑

### 静态章节（9 节）：跨会话不变

| 章节 | 核心问题 | 设计意图 |
|------|---------|---------|
| 身份 | "我是谁？" | 锚定 LLM 的角色认知，防止角色漂移 |
| 系统规则 | "遵守什么规矩？" | 定义全局行为约束 |
| 任务流程 | "怎么做工程任务？" | 编码完整的 Simulink 建模工作流 |
| 领域推理 | "知道什么领域知识？" | 注入汽车嵌入式工程的判断规则 |
| 能力编排 | "有哪些工具可用？" | 描述工具的用途和调用时机 |
| 安全规则 | "什么不能做？" | 定义危险操作的边界 |
| 执行纪律 | "执行时注意什么？" | 规范 todo 管理、单线程执行等纪律 |
| 沟通风格 | "怎么和用户交流？" | 控制输出的风格和详细程度 |
| 输出效率 | "怎么写回复？" | 抑制推理过程外泄，聚焦有效输出 |

### 动态章节（5 节）：每次查询重新生成

| 章节 | 核心问题 | 设计意图 |
|------|---------|---------|
| 运行环境 | "当前环境是什么？" | 注入操作系统、Python 版本等环境信息 |
| 项目信息 | "当前项目是什么？" | 注入 CLAUDE.md 中的项目规范 |
| 记忆 | "我知道什么？" | 注入记忆系统的当前快照 |
| 技能 | "我会什么特殊技能？" | 注入已激活技能的指令 |
| 子代理 | "能找谁帮忙？" | 注入可用子代理的描述 |

## 为什么分静态和动态？

这个分离的核心动机是**缓存优化**。

Anthropic 的 prompt caching 机制对系统提示的前缀部分进行缓存。如果前缀不变，后续请求可以直接复用缓存，节省 90% 的输入 token 成本。

ASC 的系统提示中，9 个静态章节在所有会话中完全相同。把它们放在前面，意味着只要用户不切换项目，缓存命中率极高。5 个动态章节放在后面，每次查询重新生成，但它们通常只占系统提示总长度的 20-30%。

两者之间用一个哨兵标记（`__ASC_SYSTEM_PROMPT_DYNAMIC_BOUNDARY__`）分隔。这个标记不是给 LLM 看的——是给缓存系统和调试工具用的，让它们能精确区分稳定部分和变化部分。

## 章节顺序的设计意图

章节不是随意排列的。顺序本身就编码了优先级——LLM 对文档开头的注意力最强，越往后越弱。

1. **身份在最前面**：因为角色认知是所有行为的基础。如果 LLM 不确定自己是谁，后续所有指令都可能被错误解读。
2. **系统规则紧随其后**：全局约束需要在 LLM 处理具体任务之前就生效。
3. **任务流程是核心**：这是最长的章节，编码了完整的 Simulink 建模工作流——从理解需求到建模决策到实现到验证到收尾。
4. **领域推理和能力编排在中间**：这两节分别告诉 LLM "知道什么"和"能做什么"。分开是为了防止 LLM 混淆知识和能力——知道某个操作不等于有工具能执行它。
5. **安全规则在能力之后**：先告诉 LLM 能做什么，再告诉它什么不能做。这比反过来更有效——如果先说"不能做"，LLM 可能会过度保守。
6. **执行纪律和沟通风格在最后**：这些是"怎么做得更好"的指导，优先级低于"做什么"和"不做什么"。

## 关键设计决策

### 任务流程：编码工程工作流

"任务流程"章节是系统提示中最长、最详细的部分。它不是泛泛的"请认真工作"，而是一个**完整的工程执行协议**：

- **需求理解阶段**：先确认理解了用户意图，再动手
- **建模决策阶段**：分析方案选项，说明选择理由
- **实现阶段**：使用 todo 系统跟踪进度，单线程执行（同时只有一个任务处于 in_progress）
- **回读验证阶段**：实现后回读模型，确认修改正确
- **收尾阶段**：更新 todo 状态，总结变更

这个工作流不是建议——它是**强制指令**。系统提示用明确的语言告诉 LLM "你必须这样做"。

### 单线程执行纪律

系统提示中有一个关键约束："同时最多只有一个任务处于 in_progress 状态"。这不是代码强制的——是通过提示指令强制的。

为什么用提示而非代码？因为这个约束是关于 LLM 行为的，不是关于系统状态的。代码可以限制 todo 系统的状态转换，但不能阻止 LLM 同时思考多个任务。只有通过提示指令，才能让 LLM 专注于当前任务，避免"东一榔头西一棒子"。

### 可逆优先原则

系统提示的安全规则章节明确要求："优先选择局部的、可逆的、可验证的操作"。这是对 LLM 天然倾向的对抗——LLM 倾向于用最直接的方式解决问题，比如直接删除一个有错误的子系统然后重建，而不是修复它。

在汽车嵌入式工程中，删除操作的风险远高于修复。一个子系统可能关联了几十个信号线和参数，删除后重建的工作量可能是修复的 10 倍。可逆优先原则确保 LLM 选择风险最低的路径。

### 输出效率：抑制推理外泄

系统提示的输出效率章节明确要求："输出应服务于协作，而非暴露内部推理"。

这是一个对 LLM 常见问题的针对性对策。LLM 在复杂任务中会进行大量的内部推理——分析选项、权衡利弊、检查约束。如果这些推理过程全部输出给用户，会淹没真正有用的信息。

ASC 的策略是：LLM 可以在 thinking blocks 中自由推理（用户可以选择查看），但正式输出应该只包含结论和行动。

## 提示的不可变性

系统提示的每个章节都是一个不可变的数据对象。一旦构建完成，就不能被修改。这防止了以下问题：

- **意外篡改**：某个构建步骤错误地修改了前面章节的内容
- **时序依赖**：后面的章节依赖前面章节的特定内容，但前面被改了
- **调试困难**：如果提示可以在运行时被修改，很难复现 LLM 的行为

不可变性是函数式编程的核心原则，在提示工程中同样适用。

## 设计权衡

### 为什么是 14 个章节而非更多/更少？

14 是实测的结果。少于 14 个章节时，某些重要指令（如安全规则和执行纪律）会被合并，导致 LLM 注意力分散。多于 14 个章节时，每个章节太短，LLM 无法深入理解。14 个章节在粒度和总长度之间找到了平衡。

### 为什么领域推理和能力编排要分开？

如果合并成一个章节"你能做什么"，LLM 会混淆"我知道如何做 X"和"我有工具做 X"。分开后，LLM 能更准确地判断：这个操作我知道怎么做，但我没有对应的工具——这种情况下它应该告诉用户需要安装什么插件，而不是假装能做。

### 为什么记忆注入在系统提示而非用户消息中？

记忆内容（项目约定、工程决策、工作状态）放在系统提示中，而非作为用户消息发送。原因是系统提示的权重更高——LLM 对系统提示中的信息给予更高的信任度和优先级。工程记忆是 LLM 做决策的基础，必须放在权重最高的位置。
