# 系统设计总览

## 设计的起点：一个根本性问题

ASC 的设计始于一个根本性问题：**如何让 LLM 真正胜任汽车嵌入式建模工作，而不仅仅是"能对话"？**

市面上大多数 AI 编程助手本质上是"聊天机器人 + 代码补全"。它们能回答问题，能生成代码片段，但无法真正理解一个 Simulink 模型的工程上下文——不知道这个模型属于哪个 ECU，不知道信号维度约束从何而来，不知道为什么选了状态机而不是查表。

ASC 的设计目标不是做一个"更聪明的聊天机器人"，而是做一个**有工程判断力的建模协作者**。这个目标决定了整个系统的架构形态。

## 核心设计理念

### 一、意图驱动，而非指令驱动

传统工具是指令驱动的：你告诉它"打开文件 → 修改第 42 行 → 保存"。ASC 是意图驱动的："门锁逻辑需要增加超时保护"。

这个区别看起来微妙，但影响深远。意图驱动意味着系统必须具备：

- **领域理解能力**：知道"超时保护"在 Simulink 里通常意味着什么（Timer 模块 + 条件判断 + 默认状态）
- **上下文感知能力**：知道当前模型的状态，才能决定在哪里添加保护逻辑
- **执行规划能力**：把一个意图分解为多个有序的工具调用
- **验证闭环能力**：执行完之后回读模型，确认修改是否符合意图

这四个能力分别对应 ASC 的四个核心子系统：Prompt（领域知识注入）、Memory（上下文持久化）、Agent（执行规划）、Tools（操作与验证）。

### 二、安全是默认状态，不是可选项

汽车嵌入式开发不允许"试试看"。一个错误的 `delete_block` 可能毁掉几周的工作。ASC 的安全设计遵循一个原则：**默认拒绝，显式放行**。

这个原则贯穿每一层：

- **工具层**：每个工具声明自己的安全属性（是否只读、是否破坏性、是否并发安全），默认最严格
- **权限层**：未知工具默认需要确认，用户必须显式配置才能自动放行
- **Shell 层**：命令执行前经过风险分类，危险命令自动拦截
- **Agent 层**：写文件前必须先读过该文件，防止覆盖未知内容

安全不是一层的职责，而是每一层的内置属性。这种"纵深防御"的设计确保任何单点失败都不会导致灾难性后果。

### 三、记忆是基础设施，不是功能

大多数 AI 工具把"记忆"当作一个可选功能——用户主动说"记住这个"，系统才保存。ASC 把记忆当作基础设施——像操作系统的文件系统一样，自动运行，无需用户干预。

为什么？因为工程工作的本质是**连续性**。今天讨论的接口定义，明天还要用；上周决定的架构方案，这周需要引用。如果每次对话都要从头解释项目背景，AI 助手的效率还不如查文档。

ASC 的记忆系统是分层的：

- **项目层**：从项目根目录继承，存储全局约定（AUTOSAR 版本、编码规范）
- **领域层**：按目录作用域，存储 ECU 级别的知识（接口定义、信号字典）
- **工作层**：自动从会话中提取，存储当前任务的进行时状态

这种分层设计反映了工程组织的自然结构——一个 monorepo 里不同子系统有不同的上下文，但共享顶层规范。

### 四、能力是组合出来的，不是预设的

ASC 不试图预定义所有可能的操作。相反，它提供一个**能力组合框架**：

- **工具**是原子操作（读文件、写文件、执行命令）
- **技能**是工具的编排方式（"创建 Simulink 子系统"是一个技能，它定义了需要哪些工具、按什么顺序调用）
- **MCP 服务器**是外部能力的接入点（MATLAB 引擎、自定义分析工具）
- **子代理**是能力的隔离执行环境（在独立上下文中执行特定技能）

这种组合式设计的哲学是：**框架定义边界，用户定义能力**。ASC 不需要知道"如何做 AUTOSAR 代码生成"，只要用户提供了对应的技能和 MCP 服务器，它就能做。

## 架构分层

```mermaid
graph LR
    U["👤 用户层<br/>CLI · TUI · 斜杠命令"] --> E["⚙️ 引擎层<br/>Agent · 查询引擎 · 上下文 · 权限"]
    E --> C["🔧 能力层<br/>工具 · 技能 · MCP · 子代理"]
    E --> S["💾 存储层<br/>会话 · 记忆 · 任务"]
    C --> X["🌐 外部系统<br/>LLM API · MATLAB · MCP 服务器"]
    S --> X
```

### 各层的设计职责

| 层级 | 设计职责 | 核心设计原则 |
|------|---------|-------------|
| 用户层 | 提供人机交互界面 | 渐进式披露：简单操作简单做，复杂操作有路径 |
| 引擎层 | 编排 LLM 推理、工具调用、上下文管理 | 关注点分离：每个子系统只管一件事 |
| 能力层 | 提供可组合的操作原语 | 能力组合：原子工具 + 编排技能 + 外部接入 |
| 存储层 | 持久化会话状态和工程知识 | 崩溃安全：追加写入，随时可恢复 |
| 外部系统 | LLM 推理引擎和工程工具链 | 提供者无关：同一套接口，不同后端 |

## 模块全景

| 模块 | 解决的核心问题 | 设计哲学 |
|------|--------------|---------|
| Agent 运行时 | 如何编排一次完整的推理-执行循环 | 两层分离：QueryEngine 管生命周期，QueryLoop 管单轮执行 |
| 工具框架 | 如何让 LLM 安全地操作外部世界 | 声明式能力位图：每个工具自描述安全属性 |
| 技能系统 | 如何复用工程知识和操作流程 | 文件系统即配置：SKILL.md 文件就是技能定义 |
| 记忆系统 | 如何跨会话积累工程知识 | 分层作用域：项目/领域/工作三层，自动发现 |
| MCP 集成 | 如何接入外部工具服务器 | 协议即接口：标准 MCP 协议，即插即用 |
| 上下文管理 | 如何在有限窗口内保持有效对话 | 渐进式压缩：五级策略，从无损到有损 |
| 权限系统 | 如何防止危险操作 | 纵深防御：六层检查，默认拒绝 |
| 会话管理 | 如何持久化和恢复对话状态 | 追加写入：JSONL 日志，崩溃可恢复 |
| 子代理 | 如何在隔离环境中执行子任务 | 能力注入：空白运行时 + 技能授权 |
| 提示工程 | 如何给 LLM 注入领域知识和行为规范 | 静/动态分离：9 节静态 + 5 节动态，缓存友好 |

## 一次对话的完整生命周期

当用户输入"帮我给 BCM 模型的门锁子系统加一个超时保护"时，系统经历以下阶段：

1. **输入解析**：CLI 层识别这是一个普通对话（非斜杠命令），提取可能的文件引用（`#path` 语法）
2. **技能激活**：如果引用了 `.slx` 文件，路径匹配的技能自动激活，注入到系统提示中
3. **上下文组装**：ContextManager 从记忆系统加载项目知识，从会话系统加载历史，组装完整上下文
4. **LLM 推理**：Agent 将上下文发送给 LLM，LLM 返回推理结果和工具调用请求
5. **权限检查**：每个工具调用经过六层权限检查，可能需要用户确认
6. **工具执行**：通过检查的工具调用被执行，结果被记录
7. **循环继续**：如果 LLM 需要更多信息，回到步骤 4；否则进入收尾
8. **状态持久化**：会话记录写入 JSONL，记忆系统更新工作记忆，Todo 状态同步

这个生命周期的每一个环节都有独立的错误恢复机制——工具执行失败不会丢失会话状态，LLM 超时可以重试，上下文溢出会自动压缩。

## 关键设计权衡

### 为什么选择 CLI 而非 GUI？

汽车嵌入式工程师的工作环境是终端密集型的——MATLAB 命令行、Git 操作、编译脚本都在终端里。CLI 不需要切换上下文，不需要鼠标操作，可以和现有工作流无缝集成。更重要的是，CLI 天然支持脚本化和自动化，这对 CI/CD 集成至关重要。

### 为什么支持双 LLM 后端？

不同任务对 LLM 的要求不同。复杂推理（如架构设计）需要最强模型；简单操作（如格式转换）可以用更快更便宜的模型。双后端让用户可以根据任务和成本灵活选择，也为私有化部署提供了路径。

### 为什么用文件系统而非数据库存储记忆和技能？

文件系统是工程人员最熟悉的存储抽象。用 JSON 文件存储记忆、用 Markdown 文件定义技能，意味着用户可以用任何文本编辑器查看和修改，可以用 Git 进行版本控制，可以在团队间共享。这比任何专有数据库格式都更透明、更可控。
