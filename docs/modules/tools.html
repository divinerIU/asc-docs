# 工具系统

## 工具的本质

工具是 LLM 与外部世界交互的唯一通道。LLM 本身只能生成文本，不能读文件、不能执行命令、不能调用 API。工具赋予了 LLM "手脚"——让它能把推理结果转化为实际操作。

ASC 的工具系统不是简单的"函数调用包装器"。它是一个**带有安全模型的执行框架**，核心设计问题是：如何让 LLM 安全地操作一个可能造成破坏的工程环境？

## 声明式能力位图：为什么不用继承？

每个工具声明一组布尔属性来描述自己的安全特征：

| 属性 | 含义 | 默认值 |
|------|------|--------|
| is_read_only | 是否只读，不修改任何状态 | false |
| is_concurrency_safe | 是否可以和其他工具并行执行 | false |
| is_destructive | 是否可能造成不可逆的破坏 | false |
| writes_workspace_files | 是否会写入工作区文件 | false |
| mutates_internal_state | 是否会修改 ASC 内部状态 | false |
| allow_in_accept_edits | 在"允许编辑"模式下是否自动放行 | false |

为什么用扁平的布尔标志而不是类继承（`ReadOnlyTool`、`DestructiveTool`）？因为安全属性是**正交的**。一个工具可以同时是"写工作区文件"和"并发安全"的，也可以是"写工作区文件"但"非并发安全"的。没有任何继承树能干净地表达这种正交关系。

更重要的是，默认值全部设为最严格的选项（`false`）。这意味着新增一个工具时，如果不显式声明属性，它会被当作"非只读、非并发安全、可能破坏性"——这是最安全的默认行为。新工具必须主动"证明"自己是安全的，才能获得更宽松的权限。

## 工具的三种来源

ASC 的工具来自三个独立的来源，它们在运行时被统一注册到同一个命名空间中：

**内置工具**（18 个）：ASC 自带的工具，覆盖文件操作、搜索、记忆管理、任务管理等基础能力。它们在启动时一次性注册，全程不变。

**MCP 工具**：通过 MCP 协议从外部服务器动态发现。命名格式为 `mcp__<服务器名>__<工具名>`，避免命名冲突。MCP 工具在首次调用时懒加载——不调用就不连接服务器，节省启动时间。

**技能工具**：技能可以声明它需要哪些工具，这些工具在技能激活时被注入到可用工具列表中。技能还可以限制子代理只能使用特定的工具子集。

三种来源的工具在 LLM 看来是完全一样的——它不需要知道一个工具是内置的、来自 MCP 服务器、还是由技能提供的。这种统一性是工具系统的核心抽象。

## 执行管道：七步生命周期

每次工具调用都经过一个七步管道。工具本身的 `execute` 方法只在第五步被调用——前四步是框架的安全检查，后两步是框架的结果处理。

**第一步：参数校验**。用工具声明的 Pydantic schema 验证输入参数。类型错误、缺少必填参数在这一步就被拦截，不会进入后续流程。

**第二步：权限检查**。调用权限系统的六层检查管道（详见"权限与安全"章节）。可能返回"允许"、"拒绝"或"需要确认"。

**第三步：并发控制**。检查工具是否标记为 `is_concurrency_safe`。如果是，可以和其他安全工具并行执行；如果不是，必须等全局串行锁释放后才能执行。这种二元并发模型避免了复杂的死锁问题。

**第四步：前置条件检查**。某些工具有硬编码的前置条件。最典型的是"先读后写"规则：`edit_file` 和 `write_file` 要求在同一会话中先对同一路径执行过 `read_file`。这防止 LLM 在没有看过文件内容的情况下盲目修改。

**第五步：执行**。调用工具的 `execute` 方法。这是唯一可能产生副作用的步骤。

**第六步：溢出处理**。如果工具输出超过阈值（默认 50,000 字符），将完整输出写入 `.asc/tool_overflow/` 目录，返回给 LLM 的是一个精简摘要加上文件路径。这防止一个大输出撑爆整个上下文窗口。

**第七步：结果返回**。包装执行结果（成功/失败/拒绝/中断），通过事件系统发送给 UI。

```mermaid
graph LR
    Call["工具调用请求"] --> Validate["参数校验"]
    Validate --> Auth["权限检查"]
    Auth --> Allow{"允许？"}
    Allow -->|否| Deny["返回拒绝"]
    Allow -->|是| Concur["并发控制"]
    Concur --> PreCond["前置条件"]
    PreCond --> Exec["执行"]
    Exec --> Spill["溢出处理"]
    Spill --> Return["返回结果"]
```

## 溢出处理：上下文窗口的守门人

溢出处理是工具系统中最容易被忽视但最重要的机制之一。

当一个工具返回大量内容时（比如 `read_file` 一个 10000 行的文件，或者 `run_shell` 输出了编译日志），这些内容会直接进入 LLM 的上下文窗口。如果不加限制，一次工具调用就可能用掉 80% 的上下文空间。

ASC 的策略是：超过阈值的内容被"溢出"到磁盘文件，LLM 收到的是一个包含预览和文件路径的摘要。摘要中明确告诉 LLM："工具已经执行完成了，不要为了获取完整内容而重新调用。用 read_file 分页读取。"

这个设计的精巧之处在于：它既保留了完整信息（在磁盘上），又不浪费上下文空间（LLM 只看到摘要），还防止了 LLM 的常见错误行为（为了获取完整输出而重复调用工具）。

## Shell 命令的风险分类

`run_shell` 是 ASC 中最危险的工具——它可以执行任意命令。ASC 对 shell 命令实施两级风险分类：

**第一级：AST 解析**。用 `bashlex` 库把命令解析为抽象语法树，递归遍历提取所有实际执行的命令名。这能正确处理管道、子 shell、命令替换等复杂结构。

**第二级：正则回退**。当 AST 解析失败时（畸形命令、Windows 特殊语法），退回到正则表达式匹配。

分类结果分为五档：

| 风险等级 | 含义 | 典型命令 |
|---------|------|---------|
| destructive | 可能造成不可逆破坏 | rm, sudo, kill, chmod |
| writes | 会写入文件系统 | mkdir, cp, mv, 重定向 |
| compound | 包含多条命令 | 用 ; 或 && 连接的命令 |
| complex | 语法复杂，难以分析 | heredoc, 命令替换 |
| default | 普通只读命令 | ls, cat, grep, git status |

关键设计决策：风险分类器**只分类，不决策**。它告诉权限系统"这个命令的风险等级是什么"，但不决定是否允许执行。决策权在权限系统。这种分离意味着分类器可以保守（多标记一些命令为危险），而不会影响正常功能。

## 工具的权限钩子

每个工具可以实现一个 `check_permission` 钩子，返回 `None` 表示"没有意见，交给通用权限系统"，返回一个字典表示"我有明确意见"。

这是一个**责任链模式**：工具先表态，如果没意见就传给通用系统。这允许特定工具有自定义的权限逻辑，而不影响其他工具。

例如，`edit_file` 可以通过钩子检查：目标文件是否在 `.git` 目录下？如果是，直接拒绝——不需要通用权限系统介入。

## 设计权衡

### 为什么前置条件是硬编码的？

"先读后写"规则是直接写在执行器里的特殊逻辑，而不是作为可配置的前置条件。原因是这个规则太重要了——如果 LLM 在没有看过文件的情况下写入，可能会覆盖重要内容。把它做成可配置的选项会引入风险：用户可能不小心关掉它。

安全关键的不变量应该由框架强制执行，而不是留给工具实现者或用户配置。

### 为什么并发模型是二元的？

ASC 的并发模型只有两种状态：并发安全（无锁）和非并发安全（全局串行锁）。没有细粒度的读写锁、没有按资源分组的锁。

原因是 Simulink 建模工具链的特点——大多数操作都涉及 MATLAB 引擎，而 MATLAB 引擎本身是单线程的。精细的锁策略在这里没有收益，反而增加死锁风险。全局串行锁简单、安全、无死锁。
