# 权限与安全

## 为什么权限系统存在？

LLM 可以执行 shell 命令、写入文件、删除内容。一个错误的 `rm -rf` 可能毁掉整个项目。一个意外的 `write_file` 可能覆盖关键文件。

权限系统的设计目标是：**在不阻碍正常工作的前提下，防止灾难性操作**。

这听起来简单，但实现起来是一个精细的平衡——太严格会让 LLM 寸步难行（每个操作都要确认），太宽松会让危险操作溜过去。ASC 的解决方案是**纵深防御**：不依赖单一检查点，而是多层叠加。

## 六层检查管道

每次工具调用都经过六层检查，按顺序执行：

```mermaid
graph TD
    Call["工具调用请求"] --> L1["第1层：工具自描述"]
    L1 --> L2["第2层：用户配置规则"]
    L2 --> L3["第3层：权限模式"]
    L3 --> L4["第4层：工作区边界"]
    L4 --> L5["第5层：Shell风险分类"]
    L5 --> L6["第6层：最终确认"]
    L6 --> Result["允许 / 拒绝"]
```

### 第 1 层：工具自描述

每个工具声明自己的安全属性——是否只读、是否破坏性、是否并发安全。这些声明在工具注册时就确定了，不需要运行时判断。

只读工具（如 `read_file`、`list_files`）在这层直接放行。这是最常见的快速路径——大多数工具调用是读取操作。

### 第 2 层：用户配置规则

用户可以在 `~/.asc/settings.json`（全局）或 `.asc/settings.json`（项目级）中定义规则。规则分三种：

- **deny**：始终拒绝，无论其他层怎么说
- **allow**：允许，跳过后续检查
- **default**：作为默认行为（确认或放行）

规则使用 glob 模式匹配工具名和输入参数。例如 `run_shell(git push*)` 匹配所有 `git push` 命令。

**项目级规则覆盖全局规则**。这允许项目团队定义统一的安全策略，同时允许个人在自己的项目中放宽限制。

### 第 3 层：权限模式

ASC 有三种权限模式：

| 模式 | 行为 | 适用场景 |
|------|------|---------|
| default | 写操作需确认，读操作放行 | 新用户、不确定环境 |
| acceptEdits | 文件编辑自动放行，其他写操作需确认 | 日常开发 |
| bypassPermissions | 所有操作自动放行 | 自动化脚本、受控环境 |

模式的选择决定了第 3 层的行为。模式在会话开始时设置，可以通过 TUI 工具栏切换。

### 第 4 层：工作区边界

所有文件操作必须在工作区内——即 ASC 启动时的工作目录及其子目录。尝试访问工作区外的文件（如 `/etc/passwd`、`../other_project/`）在这层被硬性拒绝。

路径解析会处理符号链接和相对路径，确保边界检查的准确性。

### 第 5 层：Shell 风险分类

对 `run_shell` 工具，命令经过风险分类器的分析（详见"工具系统"章节）。分类结果影响确认提示的内容——高风险命令会显示更详细的警告。

### 第 6 层：最终确认

如果前五层都没有给出明确的"允许"或"拒绝"，在这层弹出用户确认对话框。

确认结果被缓存在 `_confirmed_permissions` 集合中。缓存键由工具名和操作目标（文件路径、命令等）组成。同一会话中，对同一目标的后续操作自动放行——不需要重复确认。

## 确认缓存：为什么同一目标只确认一次？

如果用户确认了对 `door_lock.slx` 的写入，后续对该文件的写入操作自动放行。这看起来有风险——如果 LLM 第一次写入是合理的，第二次写入是错误的呢？

这个设计的逻辑是：用户确认的不是"这一次写入"，而是"这个 Agent 可以操作这个文件"。在同一个会话中，用户已经审查了 Agent 的意图，后续操作基于相同的上下文。重复确认不会增加安全性，只会增加摩擦。

## 先读后写守卫

`edit_file` 和 `write_file` 有一个硬编码的前置条件：在同一会话中，必须先对同一路径执行过 `read_file`。

这是一个**代码强制的安全不变量**——不是提示指令（LLM 可能不遵守），而是框架层面的检查。如果 LLM 试图写入一个它从未读过的文件，工具调用会被拒绝。

为什么？因为写入文件的正确性取决于对文件当前内容的了解。如果 LLM 没有看过文件就写入，它可能会覆盖重要内容。先读后写确保 LLM 至少知道文件里有什么。

## 审计日志

每一次权限决策（允许或拒绝）都被记录到 `~/.asc/logs/permissions.jsonl`。每条记录包含：

- 会话 ID
- 当前权限模式
- 工具名和输入摘要
- 决策来源（哪一层做出的决定）

审计日志是**尽力而为**的——写入失败不会阻止工具执行。这确保日志系统不会成为可用性的瓶颈。在正常情况下日志是完整的，但在磁盘满或权限问题时可能丢失条目。

## Shell 策策：分类而非拦截

Shell 命令的风险分类器是一个**策略门控，而非沙箱**。它分类风险等级，但不阻止执行。阻止是权限系统的职责。

这种分离允许分类器保守——多标记一些命令为高风险不会影响功能（只是会触发更多确认），但漏标一个危险命令可能导致问题。

分类器还会生成自然语言描述——不是"Run shell: git status"，而是"检查 Git 工作区状态"。这让确认对话框更有意义——用户看到的是操作的目的，而不是原始命令。

## 设计权衡

### 为什么 deny 优先于 allow？

如果一个操作同时匹配 deny 规则和 allow 规则，deny 胜出。这确保了安全关键的规则不会被意外覆盖。例如，项目管理员可以设置 `deny: rm -rf /`，即使用户在自己的全局配置中设置了 `allow: run_shell(*)`，这个 deny 规则仍然生效。

### 为什么审计日志是尽力而为？

如果审计日志写入失败时阻止工具执行，一个磁盘满的问题会导致整个 ASC 不可用。工程工具的首要任务是保持可用——审计是重要的，但不能以可用性为代价。

### 为什么工作区边界是硬性的？

工作区边界是唯一不可配置的安全约束——即使在 `bypassPermissions` 模式下，访问工作区外的文件仍然被拒绝。这是因为工作区边界是 ASC 的安全根基——如果它可被绕过，其他所有安全措施都失去意义。
