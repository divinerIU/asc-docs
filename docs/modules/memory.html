# 记忆架构

## 记忆问题的本质

LLM 没有持久记忆。每次对话开始时，它对你的项目一无所知。你上次讨论的接口定义、上周确定的架构方案、团队约定的编码规范——这些在 LLM 的世界里都不存在，除非你重新告诉它。

ASC 的记忆系统就是为了解决这个问题：**如何让 LLM 跨会话地"记住"工程知识？**

但这个问题比"把东西存起来"复杂得多。存储什么？不存储什么？存在哪里？什么时候读？什么时候写？写多少？这些问题的答案决定了记忆系统的架构。

## 为什么记忆是基础设施而非功能

大多数 AI 工具把记忆当作一个可选功能——用户说"记住这个"，系统才保存。ASC 把记忆当作基础设施——像操作系统的文件系统一样，自动运行，无需用户干预。

这个选择的逻辑是：**工程工作的本质是连续性**。今天讨论的接口定义，明天还要用。上周决定的架构方案，这周需要引用。如果记忆是可选功能，用户必须记得主动保存——但人最容易忘记的就是"要记住什么"。

ASC 的记忆系统在会话开始时自动加载，在会话结束时自动更新，在对话过程中自动提取关键信息。用户不需要做任何事情。

## 三层作用域模型

记忆不是存在一个大仓库里的。它按作用域分层，反映了工程组织的自然结构。

### 项目层记忆

存储位置：从当前目录向上搜索，找到的第一个 `.asc/memory/` 目录中的 `program.json`。

内容：项目级的全局约定——AUTOSAR 版本、编码规范、CI/CD 流程、测试要求。这些信息对所有子系统、所有开发者都适用。

作用域继承：一个深层子目录（如 `src/models/BCM/door_lock/`）会继承项目根目录的记忆。这和 Git 的配置继承逻辑一致。

### 领域层记忆

存储位置：当前工作目录的 `.asc/memory/` 目录中的 `domain.json`。

内容：ECU 级别或模块级别的知识——接口定义、信号字典、状态机设计、架构决策。这些信息只对特定子系统相关。

领域层记忆是最有价值的一层。它存储的不是泛泛的项目信息，而是特定领域的深度知识。当 LLM 在处理 BCM 的门锁逻辑时，领域层记忆告诉它"门锁控制使用状态机模式，有三个状态：锁定、解锁、故障"。

### 工作层记忆

存储位置：当前工作目录的 `.asc/memory/` 目录中的 `working_memory.json`。

内容：当前任务的进行时状态——正在做什么、遇到什么问题、下一步计划。还有未解决的问题和待跟进的事项。

工作层记忆的独特之处在于它**自动更新**。系统从会话的最后几条消息中提取关键信息（用户的目标、助手的结论），写入工作记忆。下次会话开始时，这些信息自动注入系统提示，LLM 能无缝衔接。

## 统一的卡片式存储

记忆的内容用统一的"卡片"格式存储。每张卡片包含：

| 字段 | 用途 |
|------|------|
| kind | 卡片类型：fact（事实）、decision（决策）、function（功能）|
| name | 卡片名称，用于去重匹配 |
| summary | 内容摘要 |
| status | 状态：active、superseded、deprecated |
| reason | 记录原因或决策依据 |
| tags | 标签列表，用于检索 |
| source_session | 来源会话 ID |
| updated_at | 最后更新时间 |

为什么用统一格式而非不同类型用不同 schema？因为记忆卡片的生命周期管理（创建、更新、去重、过期）是通用的。统一格式意味着一套代码处理所有类型，减少维护成本。

## 去重机制

同一个信息在不同会话中可能被多次发现。如果每次都创建新卡片，记忆会膨胀并充满重复。

ASC 的去重规则是：在同一集合中，如果已有卡片的 `id` 或 `name` 匹配，则更新而非追加。这意味着：

- 第一次会话发现"门锁使用状态机"→ 创建新卡片
- 第二次会话再次发现同一事实 → 更新已有卡片的时间戳和摘要
- 如果两次的摘要不同 → 新摘要覆盖旧摘要（最后发现的版本被认为是最新的）

## 提示注入：记忆如何被 LLM 看到

记忆不存在外部数据库里——它直接注入到 LLM 的系统提示中。`build_memory_prompt_section` 函数把当前的记忆快照渲染成一个 Markdown 章节，作为系统提示的动态部分发送给 LLM。

这意味着 LLM **始终完整可见**自己知道什么。它不需要通过搜索来查找记忆——记忆就在它面前。

这个设计的代价是记忆占用上下文窗口空间。但对 Simulink 工程记忆来说，这个代价是可接受的——工程记忆条目通常很小（一行接口定义、一条架构决策），总占用量可控。

## 回忆：检索而非搜索

当需要从记忆中检索信息时，ASC 使用简单的关键词匹配加评分算法，而非向量搜索或嵌入模型。

评分规则：
- 每个查询词在记忆条目的字段中出现一次就得分
- name 字段的匹配得分 3 倍加权（name 匹配通常意味着精确命中）
- 最终按得分排序返回

为什么不用更复杂的搜索？因为工程记忆条目是**结构化的、关键词密集的**。一条记忆"门锁控制使用状态机模式"包含精确的关键词（门锁、状态机），简单的词频匹配就能高精度命中。嵌入模型在这种场景下不会带来显著提升，但会增加延迟和复杂度。

## 保守写入原则

记忆系统的写入遵循保守原则：**只保存经过确认的信息**。

以下信息会被保存：
- 用户明确说"记住这个"
- LLM 在多个会话中反复确认的工程事实
- 用户和 LLM 之间达成的决策

以下信息不会被保存：
- LLM 的推测或假设
- 临时的调试信息
- 未验证的草稿

这个原则防止记忆被"污染"——如果 LLM 的错误推测被写入记忆，后续会话会把这些错误当作事实来使用，导致错误的累积放大。

## 设计权衡

### 为什么不用向量数据库？

向量数据库适合非结构化文本的语义搜索。但 ASC 的记忆是高度结构化的——每条记忆都有明确的类型、名称、标签。关键词匹配在这种结构化数据上效率更高、准确性更好，且不需要额外的基础设施（嵌入模型、向量索引）。

### 为什么记忆注入系统提示而非用户消息？

系统提示的"权重"高于用户消息——LLM 对系统提示中的信息给予更高的信任度。工程记忆是 LLM 做决策的基础信息（项目规范、接口定义），放在权重最高的位置确保 LLM 优先遵守。

### 为什么工作记忆自动更新？

如果工作记忆需要用户手动更新，大多数用户不会这么做。自动更新确保每次会话的上下文都能无缝传递到下次会话。代价是可能写入一些不重要的信息，但保守写入原则和去重机制会控制噪声。
