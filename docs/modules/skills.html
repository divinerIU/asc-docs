# 技能系统

## 工具与技能的本质区别

工具是"能做什么"——读文件、写文件、执行命令。技能是"怎么做"——在什么场景下、按什么顺序、用哪些工具完成一个工程任务。

打个比方：工具是螺丝刀、扳手、电钻；技能是"如何更换轮胎"的操作手册。操作手册告诉你先松螺丝、再顶千斤顶、再拆轮胎、再装新轮胎——它编排了工具的使用顺序，并在每个步骤注入了领域知识（比如"螺丝要对角松"）。

ASC 的技能系统让用户可以用 Markdown 文件定义这种"操作手册"，然后通过名称调用它。

## 为什么用 Markdown 文件？

技能的定义文件是 `SKILL.md`——一个带 YAML frontmatter 的 Markdown 文件。这个选择不是偶然的。

**可读性**：Markdown 是工程师最熟悉的文档格式。技能文件不需要任何工具就能阅读和编辑。

**版本控制友好**：Markdown 是纯文本，天然支持 Git 的 diff 和 merge。团队成员可以通过 PR 审查技能的修改。

**渐进复杂度**：最简单的技能只需要 3 行 frontmatter（name、description、prompt 正文）。复杂的技能可以添加工具限制、路径激活、参数化等高级功能。用户可以从简单开始，按需增加复杂度。

**无需编程**：定义一个技能不需要写 Python 代码、不需要理解 ASC 的内部架构。只需要写 Markdown 和几行 YAML。

## 技能的发现与优先级

技能从多个来源被发现，按优先级从低到高：

1. **内置技能**：ASC 自带的技能（如 `memory-distill`、`session-title`）
2. **用户技能**：`~/.asc/skills/` 目录下的技能，对所有项目生效
3. **项目技能**：从项目根目录到当前目录，沿途所有 `.asc/skills/` 目录下的技能
4. **插件技能**：通过 `/plugins install` 安装的插件包中的技能
5. **MCP 技能**：MCP 服务器通过 prompts 接口提供的技能

同名技能的优先级规则是**后者覆盖前者**——项目技能覆盖用户技能，用户技能覆盖内置技能。这和 Git 配置、npm 配置的优先级模型一致。

## 条件激活：场景感知

技能可以声明激活条件——只有当条件满足时，技能才会出现在 LLM 的可用技能列表中。最常用的条件是路径匹配：

一个声明了 `paths: [src/models/*.slx]` 的技能，只有当用户引用了匹配该模式的文件时才会激活。这意味着：

- 用户在讨论代码时，Simulink 建模技能不会出现（不干扰）
- 用户引用了 `.slx` 文件时，Simulink 技能自动激活（按需出现）
- 不同目录下的不同技能可以针对不同的工作场景

这种场景感知设计避免了"技能列表过长"的问题——用户不需要在几十个技能中手动选择，系统根据上下文自动筛选。

## 参数化：一个技能，多种用法

技能支持参数替换，用 `$ARGUMENTS`、`$1`、`$2` 或命名 `$variable` 作为占位符。用户调用技能时传入的参数会替换这些占位符。

这允许一个技能定义覆盖多种使用场景。比如一个"创建子系统"技能，可以通过参数决定创建什么类型的子系统（原子子系统、使能子系统、触发子系统），而不需要为每种类型定义单独的技能。

## Shell 插值：安全边界

技能的 prompt 正文中可以包含 shell 插值表达式（`` !`command` ``），在技能执行时动态获取值。但这个功能默认关闭——必须显式启用。

启用方式有两种：
- 在 frontmatter 中声明 `allowed-tools: [run_shell]`
- 在 frontmatter 中声明 `shell: [具体命令]`（更精确的控制）

这个安全边界是必要的。如果 shell 插值默认开启，一个恶意的技能文件可以在 prompt 正文中嵌入任意命令。显式启用确保用户知道自己在做什么。

## 技能的执行模式

技能有两种执行模式：

**内联模式（inline）**：技能的 prompt 直接注入到当前会话的系统提示中。LLM 看到技能指令后，在当前上下文中执行。适用于简单的、不需要隔离的任务。

**分叉模式（fork）**：技能在一个独立的子代理中执行，有自己的上下文和工具集。适用于需要隔离的任务（比如记忆蒸馏不应污染主对话上下文）或者后台任务（比如标题生成不应阻塞用户交互）。

分叉模式下，技能可以通过 `allowed_tools` 声明限制子代理只能使用哪些工具。这是能力隔离的关键机制——一个"只读分析"技能可以限制子代理只能使用读取类工具，防止它意外修改文件。

## 技能的持久注入

当一个技能被调用后，它的 prompt 会**永久注入**到当前会话的系统提示中。这意味着后续所有 LLM 调用都能看到这个技能的指令。

这个设计的意图是：技能不仅提供一次性的操作指导，还提供持续的行为约束。比如一个"Simulink 建模规范"技能被调用后，后续所有建模操作都会遵循它定义的规范。

## MCP 技能：协议桥接

MCP 服务器可以通过 `prompts` 接口提供技能。ASC 自动把 MCP prompts 转换为运行时技能，命名为 `mcp:<服务器名>:<prompt名>`。

这意味着 MCP 服务器不仅能提供工具，还能提供操作指导。一个 MATLAB MCP 服务器可以同时提供"执行 MATLAB 代码"（工具）和"创建 Simulink 子系统的标准流程"（技能）。

## 设计权衡

### 为什么技能不支持版本号？

技能文件没有版本号字段。原因是技能是项目级的、小粒度的配置文件，版本管理交给 Git 就够了。引入版本号会增加复杂度（版本冲突、版本范围匹配），但不会带来 Git 不能解决的问题。

### 为什么后发现的技能覆盖先发现的？

"后者覆盖"的优先级规则意味着项目可以"锁定"某个技能的特定版本——在项目目录下放一个同名的技能文件，就能覆盖用户目录下的版本。这比版本范围匹配更简单、更可控。

### 为什么技能 prompt 要持久注入？

如果技能 prompt 只在调用时生效一次，LLM 可能会在后续操作中"忘记"技能的约束。持久注入确保约束始终有效。代价是系统提示会随技能调用增多而变长，但 ASC 的上下文压缩系统会处理这个问题。
